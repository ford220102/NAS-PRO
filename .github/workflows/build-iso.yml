name: NAS-PRO v3 — Build ISO

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Zainstaluj zależności Node
        run: npm ci

      - name: Zbuduj React UI (dist/)
        run: npm run build:fast
        env:
          NODE_ENV: production

      - name: Zainstaluj narzędzia do budowania ISO
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            debootstrap \
            squashfs-tools \
            xorriso \
            grub-pc-bin \
            grub-efi-amd64-bin \
            mtools \
            dosfstools

      - name: Zbuduj ISO
        run: |
          chmod +x build-iso.sh
          sudo ./build-iso.sh nas-pro.iso

      - name: Sprawdź rozmiar ISO
        run: ls -lh nas-pro.iso

      - name: Upload ISO jako artefakt
        uses: actions/upload-artifact@v4
        with:
          name: nas-pro-v3-iso
          path: nas-pro.iso
          retention-days: 7
