name: Build NAS-PRO ISO

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            debootstrap \
            squashfs-tools \
            xorriso \
            grub-pc-bin \
            grub-efi-amd64-bin \
            mtools \
            dosfstools

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build React UI
        run: |
          npm ci
          npm run build

      - name: Build ISO
        run: |
          sudo bash build-iso.sh

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: nas-pro-iso
          path: nas-pro.iso
          retention-days: 7
