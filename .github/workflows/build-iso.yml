name: NAS-PRO v3 — Build ISO (Kiosk)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── React UI ────────────────────────────────────────
      - name: Zainstaluj zależności npm
        run: npm ci

      - name: Zbuduj React UI → dist/
        run: npm run build:fast
        env:
          NODE_ENV: production

      - name: Weryfikuj dist/
        run: |
          echo "=== Zawartość dist/ ==="
          ls -lh dist/
          echo "index.html: $(wc -c < dist/index.html) bajtów"

      # ── Narzędzia ISO ──────────────────────────────────
      - name: Zainstaluj narzędzia do budowania ISO
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            debootstrap squashfs-tools xorriso \
            grub-pc-bin grub-efi-amd64-bin \
            mtools dosfstools curl

      # ── Buduj ISO ──────────────────────────────────────
      - name: Buduj ISO (dist/ jest w katalogu roboczym)
        run: |
          chmod +x build-iso.sh
          sudo ./build-iso.sh nas-pro.iso
        # build-iso-v5.sh wykryje dist/ w SCRIPT_DIR i wbuduje React UI

      - name: Weryfikuj ISO
        run: |
          ls -lh nas-pro.iso
          echo "Rozmiar: $(du -sh nas-pro.iso | cut -f1)"

      # ── Upload ─────────────────────────────────────────
      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: nas-pro-v3-kiosk-iso
          path: nas-pro.iso
          retention-days: 14