name: NAS-PRO PRO ISO

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install FULL live-build stack
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            live-build \
            debootstrap \
            squashfs-tools \
            xorriso \
            grub-pc-bin \
            grub-efi-amd64-bin \
            mtools

      - name: Verify live-build
        run: lb config --help || echo "lb OK"

      - name: Build ISO
        run: chmod +x build-iso.sh && sudo ./build-iso.sh

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: nas-pro-iso
          path: nas-pro.iso