name: NAS-PRO v3 Stable Builder

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install live-build
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            live-build \
            debootstrap \
            squashfs-tools \
            xorriso \
            grub-pc-bin \
            grub-efi-amd64-bin \
            mtools

      - name: Build React UI
        run: |
          npm ci
          npm run build

      - name: Build ISO
        run: chmod +x build-iso.sh && sudo ./build-iso.sh

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: nas-pro-v3
          path: nas-pro.iso