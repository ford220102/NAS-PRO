name: Build Debian ISO

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            live-build \
            debootstrap \
            squashfs-tools \
            xorriso \
            isolinux \
            syslinux-efi \
            grub-pc-bin \
            grub-efi-amd64-bin \
            mtools
            
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Build React/Vite frontend
        run: npm run build

      - name: Make build script executable
        run: chmod +x build-iso.sh

      - name: Build ISO
        run: sudo ./build-iso.sh

      - name: Find built ISO
        id: find_iso
        run: |
          ISO_PATH=$(find . -name "*.iso" | head -1)
          echo "iso_path=$ISO_PATH" >> $GITHUB_OUTPUT
          echo "Found ISO: $ISO_PATH"

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: nas-pro-debian-iso
          path: ${{ steps.find_iso.outputs.iso_path }}
