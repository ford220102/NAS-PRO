name: NAS-PRO v3 — Build ISO

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── Buduj React UI ──────────────────────────────────
      - name: Zainstaluj zależności Node
        run: npm ci

      - name: Zbuduj React UI → dist/
        run: npm run build:fast
        env:
          NODE_ENV: production

      - name: Sprawdź dist/
        run: |
          ls -lh dist/
          echo "Pliki w dist/:"
          find dist/ -type f | head -20

      # ── Narzędzia do budowania ISO ──────────────────────
      - name: Zainstaluj narzędzia ISO
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            debootstrap squashfs-tools xorriso \
            grub-pc-bin grub-efi-amd64-bin \
            mtools dosfstools curl

      # ── Buduj ISO ───────────────────────────────────────
      - name: Zbuduj ISO (z React UI)
        run: |
          chmod +x build-iso.sh
          sudo ./build-iso.sh nas-pro.iso
        # dist/ jest w katalogu roboczym — build-iso.sh go wykryje i wbuduje

      - name: Sprawdź rozmiar ISO
        run: ls -lh nas-pro.iso

      # ── Upload ──────────────────────────────────────────
      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: nas-pro-v3-iso
          path: nas-pro.iso
          retention-days: 14